<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A001A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A003A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FF1493;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:transparent" />
      <stop offset="40%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="60%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="100%" style="stop-color:transparent" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="50%" style="stop-color:#FFF8DC" />
      <stop offset="100%" style="stop-color:#FFD700" />
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF69B4" />
      <stop offset="100%" style="stop-color:#FF1493" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#bg)" rx="12" ry="12"/>

  <!-- Shimmer overlay -->
  <rect width="300" height="200" fill="url(#shimmer)" rx="12" ry="12"/>

  <!-- Decorative circles -->
  <circle cx="208" cy="170" r="53" fill="#FF69B4" opacity="0.05193108113471865"/>
  <circle cx="184" cy="142" r="33" fill="#FF69B4" opacity="0.14841351209150244"/>
  <circle cx="243" cy="116" r="16" fill="#FF69B4" opacity="0.1366026481506556"/>

  <!-- Stars -->
  <polygon points="274,160 275.6,162.8 278,164 275.6,165.2 274,168 272.4,165.2 270,164 272.4,162.8" fill="#FF69B4" opacity="0.35119183778222146"/>
  <polygon points="65,172 67.0,175.5 70,177 67.0,178.5 65,182 63.0,178.5 60,177 63.0,175.5" fill="#FF69B4" opacity="0.4185449786608716"/>
  <polygon points="81,151 82.2,153.1 84,154 82.2,154.9 81,157 79.8,154.9 78,154 79.8,153.1" fill="#FF69B4" opacity="0.25576949232915114"/>
  <polygon points="89,155 91.0,158.5 94,160 91.0,161.5 89,165 87.0,161.5 84,160 87.0,158.5" fill="#FF69B4" opacity="0.4043787144495631"/>
  <polygon points="100,155 102.0,158.5 105,160 102.0,161.5 100,165 98.0,161.5 95,160 98.0,158.5" fill="#FF69B4" opacity="0.3460233377683549"/>

  <!-- Decorative diagonal lines -->
  <line x1="0" y1="0" x2="80" y2="200" stroke="#FF69B4" stroke-width="1" opacity="0.1"/>
  <line x1="185" y1="0" x2="300" y2="200" stroke="#FF69B4" stroke-width="1" opacity="0.1"/>

  <!-- Game icon (large, centered, subtle) -->
  <text x="150" y="90" text-anchor="middle" font-size="48" fill="url(#subGrad)" opacity="0.3" font-family="Arial, sans-serif">🌸</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="196" width="300" height="4" fill="url(#accent)" opacity="0.8"/>

  <!-- Category badge -->
  <rect x="10" y="10" width="58" height="20" rx="10" fill="rgba(0,0,0,0.4)" stroke="#FF69B4" stroke-width="0.5"/>
  <text x="18" y="24" font-size="10" fill="#FF69B4" font-family="Arial, sans-serif" font-weight="bold">老虎机</text>

  <!-- Small decorative icon top-right -->
  <text x="285" y="22" text-anchor="end" font-size="16" opacity="0.6">🌸</text>

  <!-- Game title -->
  <text x="150" y="148" text-anchor="middle" font-size="22" font-weight="bold" fill="url(#titleGrad)" font-family="Arial, sans-serif" letter-spacing="2">富贵花开</text>

  <!-- Subtitle / Provider -->
  <rect x="110" y="158" width="80" height="20" rx="10" fill="rgba(0,0,0,0.5)" stroke="url(#subGrad)" stroke-width="0.5"/>
  <text x="150" y="172" text-anchor="middle" font-size="11" fill="#FF69B4" font-family="Arial, sans-serif" font-weight="bold">Jili</text>

  <!-- Border glow -->
  <rect width="300" height="200" fill="none" stroke="url(#accent)" stroke-width="1.5" rx="12" ry="12" opacity="0.6"/>
</svg>