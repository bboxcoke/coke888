<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A000A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A001A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF2153;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FF2153;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:transparent" />
      <stop offset="40%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="60%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="100%" style="stop-color:transparent" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="50%" style="stop-color:#FFF8DC" />
      <stop offset="100%" style="stop-color:#FFD700" />
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF2153" />
      <stop offset="100%" style="stop-color:#FFD700" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#bg)" rx="12" ry="12"/>

  <!-- Shimmer overlay -->
  <rect width="300" height="200" fill="url(#shimmer)" rx="12" ry="12"/>

  <!-- Decorative circles -->
  <circle cx="156" cy="113" r="55" fill="#FF2153" opacity="0.13908133971875886"/>
  <circle cx="262" cy="104" r="20" fill="#FF2153" opacity="0.10384922870798327"/>
  <circle cx="134" cy="162" r="20" fill="#FF2153" opacity="0.14302851941683703"/>
  <circle cx="197" cy="45" r="37" fill="#FF2153" opacity="0.08193386437176482"/>
  <circle cx="116" cy="37" r="36" fill="#FF2153" opacity="0.14881277725382486"/>
  <circle cx="239" cy="42" r="19" fill="#FF2153" opacity="0.11931477606588517"/>

  <!-- Stars -->
  <polygon points="230,8 231.2,10.1 233,11 231.2,11.9 230,14 228.8,11.9 227,11 228.8,10.1" fill="#FF2153" opacity="0.33497968991452504"/>
  <polygon points="232,187 232.8,188.4 234,189 232.8,189.6 232,191 231.2,189.6 230,189 231.2,188.4" fill="#FF2153" opacity="0.2804290500605472"/>
  <polygon points="236,74 238.0,77.5 241,79 238.0,80.5 236,84 234.0,80.5 231,79 234.0,77.5" fill="#FF2153" opacity="0.2506483503272045"/>
  <polygon points="117,144 117.8,145.4 119,146 117.8,146.6 117,148 116.2,146.6 115,146 116.2,145.4" fill="#FF2153" opacity="0.36470627094013425"/>
  <polygon points="70,165 72.0,168.5 75,170 72.0,171.5 70,175 68.0,171.5 65,170 68.0,168.5" fill="#FF2153" opacity="0.37076691653594435"/>
  <polygon points="274,143 275.2,145.1 277,146 275.2,146.9 274,149 272.8,146.9 271,146 272.8,145.1" fill="#FF2153" opacity="0.3997593002630355"/>

  <!-- Decorative diagonal lines -->
  <line x1="0" y1="0" x2="61" y2="200" stroke="#FF2153" stroke-width="1" opacity="0.1"/>
  <line x1="197" y1="0" x2="300" y2="200" stroke="#FF2153" stroke-width="1" opacity="0.1"/>

  <!-- Game icon (large, centered, subtle) -->
  <text x="150" y="90" text-anchor="middle" font-size="48" fill="url(#subGrad)" opacity="0.3" font-family="Arial, sans-serif">🎡</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="195" width="300" height="5" fill="url(#accent)" opacity="0.8"/>

  <!-- Category badge -->
  <rect x="10" y="10" width="58" height="20" rx="10" fill="rgba(0,0,0,0.4)" stroke="#FF2153" stroke-width="0.5"/>
  <text x="18" y="24" font-size="10" fill="#FF2153" font-family="Arial, sans-serif" font-weight="bold">老虎机</text>

  <!-- Small decorative icon top-right -->
  <text x="285" y="22" text-anchor="end" font-size="16" opacity="0.6">🎡</text>

  <!-- Game title -->
  <text x="150" y="148" text-anchor="middle" font-size="22" font-weight="bold" fill="url(#titleGrad)" font-family="Arial, sans-serif" letter-spacing="2">财富轮盘</text>

  <!-- Subtitle / Provider -->
  <rect x="110" y="158" width="80" height="20" rx="10" fill="rgba(0,0,0,0.5)" stroke="url(#subGrad)" stroke-width="0.5"/>
  <text x="150" y="172" text-anchor="middle" font-size="11" fill="#FF2153" font-family="Arial, sans-serif" font-weight="bold">PP</text>

  <!-- Border glow -->
  <rect width="300" height="200" fill="none" stroke="url(#accent)" stroke-width="1.5" rx="12" ry="12" opacity="0.6"/>
</svg>