<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001030;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002060;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#1E90FF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00BFFF;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:transparent" />
      <stop offset="40%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="60%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="100%" style="stop-color:transparent" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="50%" style="stop-color:#FFF8DC" />
      <stop offset="100%" style="stop-color:#FFD700" />
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00BFFF" />
      <stop offset="100%" style="stop-color:#1E90FF" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#bg)" rx="12" ry="12"/>

  <!-- Shimmer overlay -->
  <rect width="300" height="200" fill="url(#shimmer)" rx="12" ry="12"/>

  <!-- Decorative circles -->
  <circle cx="32" cy="90" r="30" fill="#00BFFF" opacity="0.07232107381488227"/>
  <circle cx="72" cy="159" r="20" fill="#00BFFF" opacity="0.10904925124490397"/>
  <circle cx="36" cy="27" r="20" fill="#00BFFF" opacity="0.07186379748036034"/>

  <!-- Stars -->
  <polygon points="23,150 24.2,152.1 26,153 24.2,153.9 23,156 21.8,153.9 20,153 21.8,152.1" fill="#00BFFF" opacity="0.48640784516896135"/>
  <polygon points="289,114 290.2,116.1 292,117 290.2,117.9 289,120 287.8,117.9 286,117 287.8,116.1" fill="#00BFFF" opacity="0.37968361851354143"/>
  <polygon points="152,8 153.2,10.1 155,11 153.2,11.9 152,14 150.8,11.9 149,11 150.8,10.1" fill="#00BFFF" opacity="0.47925575799529074"/>
  <polygon points="184,78 185.2,80.1 187,81 185.2,81.9 184,84 182.8,81.9 181,81 182.8,80.1" fill="#00BFFF" opacity="0.2861255048430355"/>
  <polygon points="182,34 182.8,35.4 184,36 182.8,36.6 182,38 181.2,36.6 180,36 181.2,35.4" fill="#00BFFF" opacity="0.3519709202549349"/>
  <polygon points="193,94 194.6,96.8 197,98 194.6,99.2 193,102 191.4,99.2 189,98 191.4,96.8" fill="#00BFFF" opacity="0.522851309309752"/>
  <polygon points="245,145 245.8,146.4 247,147 245.8,147.6 245,149 244.2,147.6 243,147 244.2,146.4" fill="#00BFFF" opacity="0.5892463055917483"/>
  <polygon points="203,26 204.6,28.8 207,30 204.6,31.2 203,34 201.4,31.2 199,30 201.4,28.8" fill="#00BFFF" opacity="0.531761865701198"/>

  <!-- Decorative diagonal lines -->
  <line x1="0" y1="0" x2="123" y2="200" stroke="#00BFFF" stroke-width="1" opacity="0.1"/>
  <line x1="174" y1="0" x2="300" y2="200" stroke="#00BFFF" stroke-width="1" opacity="0.1"/>

  <!-- Game icon (large, centered, subtle) -->
  <text x="150" y="90" text-anchor="middle" font-size="48" fill="url(#subGrad)" opacity="0.3" font-family="Arial, sans-serif">🐟</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="195" width="300" height="5" fill="url(#accent)" opacity="0.8"/>

  <!-- Category badge -->
  <rect x="10" y="10" width="44" height="20" rx="10" fill="rgba(0,0,0,0.4)" stroke="#00BFFF" stroke-width="0.5"/>
  <text x="18" y="24" font-size="10" fill="#00BFFF" font-family="Arial, sans-serif" font-weight="bold">捕鱼</text>

  <!-- Small decorative icon top-right -->
  <text x="285" y="22" text-anchor="end" font-size="16" opacity="0.6">🐟</text>

  <!-- Game title -->
  <text x="150" y="148" text-anchor="middle" font-size="22" font-weight="bold" fill="url(#titleGrad)" font-family="Arial, sans-serif" letter-spacing="2">捕鱼达人</text>

  <!-- Subtitle / Provider -->
  <rect x="110" y="158" width="80" height="20" rx="10" fill="rgba(0,0,0,0.5)" stroke="url(#subGrad)" stroke-width="0.5"/>
  <text x="150" y="172" text-anchor="middle" font-size="11" fill="#00BFFF" font-family="Arial, sans-serif" font-weight="bold">JDB</text>

  <!-- Border glow -->
  <rect width="300" height="200" fill="none" stroke="url(#accent)" stroke-width="1.5" rx="12" ry="12" opacity="0.6"/>
</svg>