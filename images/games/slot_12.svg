<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#E0FFFF;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#00FFFF;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:transparent" />
      <stop offset="40%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="60%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="100%" style="stop-color:transparent" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="50%" style="stop-color:#FFF8DC" />
      <stop offset="100%" style="stop-color:#FFD700" />
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFFF" />
      <stop offset="100%" style="stop-color:#E0FFFF" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#bg)" rx="12" ry="12"/>

  <!-- Shimmer overlay -->
  <rect width="300" height="200" fill="url(#shimmer)" rx="12" ry="12"/>

  <!-- Decorative circles -->
  <circle cx="253" cy="148" r="60" fill="#00FFFF" opacity="0.09826958249284423"/>
  <circle cx="204" cy="136" r="16" fill="#00FFFF" opacity="0.13581866169652737"/>
  <circle cx="38" cy="63" r="37" fill="#00FFFF" opacity="0.12468020404306424"/>
  <circle cx="153" cy="34" r="25" fill="#00FFFF" opacity="0.0546881097258904"/>

  <!-- Stars -->
  <polygon points="235,57 236.2,59.1 238,60 236.2,60.9 235,63 233.8,60.9 232,60 233.8,59.1" fill="#00FFFF" opacity="0.2506121103113844"/>
  <polygon points="189,135 190.6,137.8 193,139 190.6,140.2 189,143 187.4,140.2 185,139 187.4,137.8" fill="#00FFFF" opacity="0.40462655621847754"/>
  <polygon points="216,20 217.6,22.8 220,24 217.6,25.2 216,28 214.4,25.2 212,24 214.4,22.8" fill="#00FFFF" opacity="0.3113305215633534"/>
  <polygon points="56,178 58.0,181.5 61,183 58.0,184.5 56,188 54.0,184.5 51,183 54.0,181.5" fill="#00FFFF" opacity="0.3548393292409941"/>
  <polygon points="136,175 137.2,177.1 139,178 137.2,178.9 136,181 134.8,178.9 133,178 134.8,177.1" fill="#00FFFF" opacity="0.50356284693418"/>

  <!-- Decorative diagonal lines -->
  <line x1="0" y1="0" x2="132" y2="200" stroke="#00FFFF" stroke-width="1" opacity="0.1"/>
  <line x1="211" y1="0" x2="300" y2="200" stroke="#00FFFF" stroke-width="1" opacity="0.1"/>

  <!-- Game icon (large, centered, subtle) -->
  <text x="150" y="90" text-anchor="middle" font-size="48" fill="url(#subGrad)" opacity="0.3" font-family="Arial, sans-serif">💎</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="194" width="300" height="6" fill="url(#accent)" opacity="0.8"/>

  <!-- Category badge -->
  <rect x="10" y="10" width="58" height="20" rx="10" fill="rgba(0,0,0,0.4)" stroke="#00FFFF" stroke-width="0.5"/>
  <text x="18" y="24" font-size="10" fill="#00FFFF" font-family="Arial, sans-serif" font-weight="bold">老虎机</text>

  <!-- Small decorative icon top-right -->
  <text x="285" y="22" text-anchor="end" font-size="16" opacity="0.6">💎</text>

  <!-- Game title -->
  <text x="150" y="148" text-anchor="middle" font-size="22" font-weight="bold" fill="url(#titleGrad)" font-family="Arial, sans-serif" letter-spacing="2">钻石之星</text>

  <!-- Subtitle / Provider -->
  <rect x="110" y="158" width="80" height="20" rx="10" fill="rgba(0,0,0,0.5)" stroke="url(#subGrad)" stroke-width="0.5"/>
  <text x="150" y="172" text-anchor="middle" font-size="11" fill="#00FFFF" font-family="Arial, sans-serif" font-weight="bold">Joker</text>

  <!-- Border glow -->
  <rect width="300" height="200" fill="none" stroke="url(#accent)" stroke-width="1.5" rx="12" ry="12" opacity="0.6"/>
</svg>