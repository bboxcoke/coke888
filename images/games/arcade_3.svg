<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0010;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2A0020;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#FF1493;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:transparent" />
      <stop offset="40%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="60%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="100%" style="stop-color:transparent" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="50%" style="stop-color:#FFF8DC" />
      <stop offset="100%" style="stop-color:#FFD700" />
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF69B4" />
      <stop offset="100%" style="stop-color:#FF1493" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#bg)" rx="12" ry="12"/>

  <!-- Shimmer overlay -->
  <rect width="300" height="200" fill="url(#shimmer)" rx="12" ry="12"/>

  <!-- Decorative circles -->
  <circle cx="79" cy="65" r="39" fill="#FF69B4" opacity="0.07251595205781466"/>
  <circle cx="34" cy="77" r="22" fill="#FF69B4" opacity="0.10686891973674716"/>
  <circle cx="71" cy="60" r="47" fill="#FF69B4" opacity="0.11888194157890447"/>
  <circle cx="175" cy="116" r="52" fill="#FF69B4" opacity="0.09050477353192561"/>
  <circle cx="186" cy="111" r="19" fill="#FF69B4" opacity="0.08388209033125854"/>
  <circle cx="164" cy="178" r="25" fill="#FF69B4" opacity="0.06120098271296476"/>

  <!-- Stars -->
  <polygon points="58,75 59.6,77.8 62,79 59.6,80.2 58,83 56.4,80.2 54,79 56.4,77.8" fill="#FF69B4" opacity="0.24308674616550774"/>
  <polygon points="158,14 159.6,16.8 162,18 159.6,19.2 158,22 156.4,19.2 154,18 156.4,16.8" fill="#FF69B4" opacity="0.3543515387052683"/>
  <polygon points="254,128 255.2,130.1 257,131 255.2,131.9 254,134 252.8,131.9 251,131 252.8,130.1" fill="#FF69B4" opacity="0.27543726602209395"/>
  <polygon points="142,71 142.8,72.4 144,73 142.8,73.6 142,75 141.2,73.6 140,73 141.2,72.4" fill="#FF69B4" opacity="0.217377926926961"/>

  <!-- Decorative diagonal lines -->
  <line x1="0" y1="0" x2="140" y2="200" stroke="#FF69B4" stroke-width="1" opacity="0.1"/>
  <line x1="154" y1="0" x2="300" y2="200" stroke="#FF69B4" stroke-width="1" opacity="0.1"/>

  <!-- Game icon (large, centered, subtle) -->
  <text x="150" y="90" text-anchor="middle" font-size="48" fill="url(#subGrad)" opacity="0.3" font-family="Arial, sans-serif">🍉</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="194" width="300" height="6" fill="url(#accent)" opacity="0.8"/>

  <!-- Category badge -->
  <rect x="10" y="10" width="44" height="20" rx="10" fill="rgba(0,0,0,0.4)" stroke="#FF69B4" stroke-width="0.5"/>
  <text x="18" y="24" font-size="10" fill="#FF69B4" font-family="Arial, sans-serif" font-weight="bold">街机</text>

  <!-- Small decorative icon top-right -->
  <text x="285" y="22" text-anchor="end" font-size="16" opacity="0.6">🍉</text>

  <!-- Game title -->
  <text x="150" y="148" text-anchor="middle" font-size="22" font-weight="bold" fill="url(#titleGrad)" font-family="Arial, sans-serif" letter-spacing="2">水果忍者</text>

  <!-- Subtitle / Provider -->
  <rect x="110" y="158" width="80" height="20" rx="10" fill="rgba(0,0,0,0.5)" stroke="url(#subGrad)" stroke-width="0.5"/>
  <text x="150" y="172" text-anchor="middle" font-size="11" fill="#FF69B4" font-family="Arial, sans-serif" font-weight="bold">Jili</text>

  <!-- Border glow -->
  <rect width="300" height="200" fill="none" stroke="url(#accent)" stroke-width="1.5" rx="12" ry="12" opacity="0.6"/>
</svg>