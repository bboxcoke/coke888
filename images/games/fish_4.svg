<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000010;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000020;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000080;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#0000CD;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#000080;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:transparent" />
      <stop offset="40%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="60%" style="stop-color:rgba(255,255,255,0.08)" />
      <stop offset="100%" style="stop-color:transparent" />
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700" />
      <stop offset="50%" style="stop-color:#FFF8DC" />
      <stop offset="100%" style="stop-color:#FFD700" />
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#000080" />
      <stop offset="100%" style="stop-color:#0000CD" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="300" height="200" fill="url(#bg)" rx="12" ry="12"/>

  <!-- Shimmer overlay -->
  <rect width="300" height="200" fill="url(#shimmer)" rx="12" ry="12"/>

  <!-- Decorative circles -->
  <circle cx="233" cy="144" r="31" fill="#000080" opacity="0.058187934237116656"/>
  <circle cx="193" cy="25" r="19" fill="#000080" opacity="0.09842559174525467"/>
  <circle cx="78" cy="92" r="22" fill="#000080" opacity="0.14563359790372715"/>
  <circle cx="38" cy="179" r="19" fill="#000080" opacity="0.06350111609070404"/>
  <circle cx="98" cy="74" r="60" fill="#000080" opacity="0.0928387590311105"/>

  <!-- Stars -->
  <polygon points="218,44 218.8,45.4 220,46 218.8,46.6 218,48 217.2,46.6 216,46 217.2,45.4" fill="#000080" opacity="0.5691832990412948"/>
  <polygon points="98,88 99.6,90.8 102,92 99.6,93.2 98,96 96.4,93.2 94,92 96.4,90.8" fill="#000080" opacity="0.34261541001526413"/>
  <polygon points="173,29 175.0,32.5 178,34 175.0,35.5 173,39 171.0,35.5 168,34 171.0,32.5" fill="#000080" opacity="0.23593131012091992"/>
  <polygon points="178,86 180.0,89.5 183,91 180.0,92.5 178,96 176.0,92.5 173,91 176.0,89.5" fill="#000080" opacity="0.4796731319318177"/>
  <polygon points="281,175 282.6,177.8 285,179 282.6,180.2 281,183 279.4,180.2 277,179 279.4,177.8" fill="#000080" opacity="0.4372633149124363"/>
  <polygon points="40,132 41.6,134.8 44,136 41.6,137.2 40,140 38.4,137.2 36,136 38.4,134.8" fill="#000080" opacity="0.5647057479908137"/>
  <polygon points="189,47 189.8,48.4 191,49 189.8,49.6 189,51 188.2,49.6 187,49 188.2,48.4" fill="#000080" opacity="0.2998684301971456"/>
  <polygon points="227,82 228.2,84.1 230,85 228.2,85.9 227,88 225.8,85.9 224,85 225.8,84.1" fill="#000080" opacity="0.3657988053118013"/>

  <!-- Decorative diagonal lines -->
  <line x1="0" y1="0" x2="68" y2="200" stroke="#000080" stroke-width="1" opacity="0.1"/>
  <line x1="224" y1="0" x2="300" y2="200" stroke="#000080" stroke-width="1" opacity="0.1"/>

  <!-- Game icon (large, centered, subtle) -->
  <text x="150" y="90" text-anchor="middle" font-size="48" fill="url(#subGrad)" opacity="0.3" font-family="Arial, sans-serif">🦈</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="194" width="300" height="6" fill="url(#accent)" opacity="0.8"/>

  <!-- Category badge -->
  <rect x="10" y="10" width="44" height="20" rx="10" fill="rgba(0,0,0,0.4)" stroke="#000080" stroke-width="0.5"/>
  <text x="18" y="24" font-size="10" fill="#000080" font-family="Arial, sans-serif" font-weight="bold">捕鱼</text>

  <!-- Small decorative icon top-right -->
  <text x="285" y="22" text-anchor="end" font-size="16" opacity="0.6">🦈</text>

  <!-- Game title -->
  <text x="150" y="148" text-anchor="middle" font-size="22" font-weight="bold" fill="url(#titleGrad)" font-family="Arial, sans-serif" letter-spacing="2">深海猎手</text>

  <!-- Subtitle / Provider -->
  <rect x="110" y="158" width="80" height="20" rx="10" fill="rgba(0,0,0,0.5)" stroke="url(#subGrad)" stroke-width="0.5"/>
  <text x="150" y="172" text-anchor="middle" font-size="11" fill="#000080" font-family="Arial, sans-serif" font-weight="bold">PP</text>

  <!-- Border glow -->
  <rect width="300" height="200" fill="none" stroke="url(#accent)" stroke-width="1.5" rx="12" ry="12" opacity="0.6"/>
</svg>