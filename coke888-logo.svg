<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 70" width="380" height="70">
  <defs>
    <linearGradient id="cokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D76E"/>
      <stop offset="40%" style="stop-color:#D4A843"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="numGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC"/>
      <stop offset="30%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- "Coke888" 连在一起 -->
  <text x="10" y="50" font-family="'Trajan Pro', 'Times New Roman', Georgia, serif"
        font-size="52" font-weight="bold" fill="url(#cokeGrad)" filter="url(#shadow)" letter-spacing="1">
    Coke<tspan fill="url(#numGrad)" font-size="58" font-weight="900">888</tspan>
  </text>
</svg>
